<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcja 2 — Kierunki i położenie</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1a2e4a;--red:#d63528;--green:#15803d;
  --bg:#f5f2ec;--white:#fff;--border:#e0dbd0;--muted:#999;
}
body{background:var(--bg);font-family:'Nunito',sans-serif;min-height:100vh;padding:20px 16px;color:var(--navy);}
.wrap{max-width:860px;margin:0 auto;}

/* HEADER */
.header{background:var(--navy);border-radius:12px;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.h-title{font-size:1rem;font-weight:900;color:#fff;}
.h-sub{font-size:0.67rem;color:rgba(255,255,255,0.4);font-weight:700;margin-top:2px;}
.h-badge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:0.65rem;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:1px;}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.prog-bar{flex:1;height:4px;background:rgba(26,46,74,0.1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:var(--navy);border-radius:99px;transition:width 0.5s;}
.prog-txt{font-size:0.65rem;font-weight:900;color:var(--muted);letter-spacing:1px;white-space:nowrap;}

/* INFOGRAFIKA */
.info-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.info-bar{
  background:var(--navy);padding:8px 16px;
  font-size:0.6rem;font-weight:900;
  color:rgba(255,255,255,0.45);letter-spacing:2px;text-transform:uppercase;
}
.svg-outer{
  width:100%;
  padding:0;
  position:relative;
}
.map-svg{width:100%;display:block;}

/* Etykiety na SVG */
.dir-label{
  position:absolute;
  font-family:'Courier Prime',monospace;
  font-size:0.78rem;font-weight:700;
  color:var(--navy);
  background:rgba(255,255,255,0.92);
  border:1.5px solid var(--navy);
  border-radius:6px;
  padding:3px 9px;
  white-space:nowrap;
  cursor:pointer;
  transition:all 0.15s;
  transform:translate(-50%,-50%);
}
.dir-label:hover{background:var(--navy);color:#fff;}
.dir-label.active{background:var(--navy);color:#fff;}
.dir-label .pl{
  display:block;
  font-family:'Nunito',sans-serif;
  font-size:0.6rem;font-weight:700;
  color:var(--muted);margin-top:1px;
}
.dir-label.active .pl{color:rgba(255,255,255,0.55);}
.dir-label:hover .pl{color:rgba(255,255,255,0.55);}

/* AKTYWNA KARTA */
.active-strip{
  border-top:1px solid var(--border);
  padding:14px 18px;
  min-height:72px;
  display:flex;align-items:center;gap:16px;
}
.as-empty{font-size:0.78rem;color:var(--muted);font-weight:700;}
.as-en{font-family:'Courier Prime',monospace;font-size:1.1rem;font-weight:700;color:var(--navy);}
.as-pl{font-size:0.8rem;font-weight:700;color:var(--muted);margin-top:2px;}
.as-ex{font-size:0.72rem;color:var(--navy);margin-top:4px;font-style:italic;}
.as-sound{
  margin-left:auto;flex-shrink:0;
  background:none;border:1.5px solid var(--border);
  border-radius:8px;padding:7px 12px;
  font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:700;
  color:var(--navy);cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:5px;
}
.as-sound:hover{border-color:var(--navy);background:var(--bg);}
.as-sound.pl{background:var(--navy);color:#fff;border-color:var(--navy);}

/* DOLNA SIATKA SŁÓWEK */
.words-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:16px;
}
.word-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:11px 12px;
  cursor:pointer;
  transition:all 0.15s;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.word-card:hover{border-color:var(--navy);transform:translateY(-1px);box-shadow:0 3px 10px rgba(26,46,74,0.1);}
.word-card.active{border-color:var(--navy);background:var(--navy);}
.word-card.seen{border-color:#c8f0c8;}
.wc-en{
  font-family:'Courier Prime',monospace;
  font-size:0.8rem;font-weight:700;
  color:var(--navy);margin-bottom:3px;
  transition:color 0.15s;
}
.word-card.active .wc-en{color:#fff;}
.wc-pl{font-size:0.65rem;font-weight:700;color:var(--muted);transition:color 0.15s;}
.word-card.active .wc-pl{color:rgba(255,255,255,0.5);}
.wc-check{font-size:0.65rem;color:var(--green);margin-top:3px;display:none;}
.word-card.seen .wc-check{display:block;}

/* QUIZ + TIP */
.bottom-row{display:flex;justify-content:center;margin-bottom:14px;}

.quiz-card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  width:100%;max-width:520px;
}
.qc-head{background:var(--red);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.qc-title{font-size:0.65rem;font-weight:900;color:#fff;letter-spacing:1.5px;text-transform:uppercase;}
.qc-prog{font-size:0.62rem;color:rgba(255,255,255,0.6);font-weight:700;}
.qc-body{padding:13px 14px;}
.q-q{font-size:0.82rem;font-weight:700;line-height:1.5;margin-bottom:10px;padding:8px 11px;background:var(--bg);border-radius:7px;border-left:2.5px solid var(--navy);}
.q-opt{
  background:var(--bg);border:1.5px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:0.78rem;font-weight:700;
  cursor:pointer;margin-bottom:6px;width:100%;text-align:left;
  color:var(--navy);display:flex;align-items:center;gap:9px;transition:all 0.13s;
  font-family:'Nunito',sans-serif;
}
.q-opt:last-child{margin-bottom:0;}
.q-opt:hover:not(:disabled){border-color:var(--navy);background:var(--white);}
.q-opt.ok{background:#f0fdf4;border-color:var(--green);color:var(--green);}
.q-opt.no{background:#fef2f2;border-color:var(--red);color:var(--red);}
.q-opt:disabled{cursor:default;}
.q-ltr{width:20px;height:20px;border-radius:50%;background:rgba(26,46,74,0.1);display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:900;color:var(--navy);flex-shrink:0;transition:all 0.13s;}
.q-opt.ok .q-ltr{background:var(--green);color:#fff;}
.q-opt.no .q-ltr{background:var(--red);color:#fff;}
.q-fb{font-size:0.72rem;font-weight:700;margin-top:8px;padding:7px 10px;border-radius:7px;display:none;line-height:1.5;}
.q-fb.show{display:block;}
.q-fb.ok{background:#f0fdf4;border:1px solid #86efac;color:var(--green);}
.q-fb.no{background:#fef2f2;border:1px solid #fca5a5;color:var(--red);}
.q-next{margin-top:8px;width:100%;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:900;cursor:pointer;display:none;transition:all 0.15s;}
.q-next:hover{background:#2a4a6a;}
.q-next.show{display:block;}
.
