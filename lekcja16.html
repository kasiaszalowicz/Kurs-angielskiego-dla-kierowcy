<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcja 16 — Tachograf i karta kierowcy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1a2e4a;--red:#d63528;--green:#15803d;
  --bg:#f5f2ec;--white:#fff;--border:#e0dbd0;--muted:#888;
  --yellow:#ffe566;--purple:#7c3aed;
}
body{background:var(--bg);font-family:'Nunito',sans-serif;min-height:100vh;padding:20px 16px;color:var(--navy);}
.wrap{max-width:860px;margin:0 auto;}

/* HEADER */
.header{background:var(--navy);border-radius:12px;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.h-title{font-size:1rem;font-weight:900;color:#fff;}
.h-sub{font-size:0.67rem;color:rgba(255,255,255,0.4);font-weight:700;margin-top:2px;}
.h-badge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:0.65rem;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:1px;}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.prog-bar{flex:1;height:4px;background:rgba(26,46,74,0.1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:var(--navy);border-radius:99px;transition:width 0.5s;}
.prog-txt{font-size:0.65rem;font-weight:900;color:var(--muted);letter-spacing:1px;white-space:nowrap;}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 290px;gap:14px;margin-bottom:14px;}

/* SIATKA KART */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.doc-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:14px 15px;
  cursor:pointer;
  transition:all 0.15s;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  position:relative;
}
.doc-card:hover{border-color:var(--navy);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,46,74,0.1);}
.doc-card.active{border-color:var(--navy);background:#f0f4f8;}
.doc-card.seen{border-color:#c8f0c8;}

.dc-num{
  font-size:0.58rem;font-weight:900;
  color:var(--muted);letter-spacing:1px;
  margin-bottom:6px;text-transform:uppercase;
}
.dc-en{
  font-family:'Courier Prime',monospace;
  font-size:0.95rem;font-weight:700;
  color:var(--navy);margin-bottom:3px;line-height:1.3;
}
.doc-card.active .dc-en{color:var(--navy);}
.dc-pl{font-size:0.68rem;font-weight:700;color:var(--muted);}
.dc-tag{
  display:inline-block;
  font-size:0.58rem;font-weight:900;
  padding:2px 8px;border-radius:99px;
  margin-top:6px;letter-spacing:0.5px;
}
.dc-check{
  position:absolute;top:10px;right:10px;
  font-size:0.7rem;color:var(--green);display:none;
}
.doc-card.seen .dc-check{display:block;}

/* PRAWY PANEL */
.right-col{display:flex;flex-direction:column;gap:12px;}

.active-card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  flex:1;
}
.ac-head{padding:8px 14px;font-size:0.6rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;}
.ac-body{padding:14px 15px;}
.ac-empty{font-size:0.75rem;color:var(--muted);font-weight:700;text-align:center;padding:16px 0;line-height:1.7;}

.ac-num{display:inline-block;font-size:0.58rem;font-weight:900;padding:2px 9px;border-radius:99px;letter-spacing:1px;margin-bottom:8px;}
.ac-en{font-family:'Courier Prime',monospace;font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:3px;line-height:1.3;}
.ac-pl{font-size:0.75rem;font-weight:700;color:var(--muted);margin-bottom:10px;}

.ac-section{margin-bottom:10px;}
.ac-section-label{font-size:0.58rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;}
.ac-desc{font-size:0.75rem;line-height:1.6;color:var(--navy);padding:8px 11px;background:var(--bg);border-radius:7px;}
.ac-phrase{
  font-family:'Courier Prime',monospace;font-size:0.82rem;font-weight:700;
  color:var(--navy);padding:8px 11px;background:var(--bg);
  border-radius:7px;border-left:2.5px solid var(--navy);
  line-height:1.5;margin-bottom:3px;
}
.ac-phrase-pl{font-size:0.65rem;color:var(--muted);font-style:italic;padding:0 2px;margin-bottom:8px;}

.ac-sound{
  width:100%;background:none;border:1.5px solid var(--border);
  border-radius:7px;padding:7px;font-family:'Nunito',sans-serif;
  font-size:0.72rem;font-weight:700;color:var(--navy);cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.ac-sound:hover{border-color:var(--navy);background:var(--bg);}
.ac-sound.pl{background:var(--navy);color:#fff;border-color:var(--navy);}

/* TIP BOX */
.tip-box{background:var(--navy);border-radius:12px;padding:14px 15px;}
.tb-title{font-size:0.6rem;font-weight:900;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;}
.tb-item{display:flex;gap:8px;margin-bottom:7px;font-size:0.73rem;color:rgba(255,255,255,0.8);line-height:1.5;}
.tb-item:last-child{margin-bottom:0;}
.tb-phrase{font-family:'Courier Prime',monospace;color:var(--yellow);font-size:0.72rem;}

/* QUIZ */
.quiz-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.qc-head{background:var(--red);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.qc-title{font-size:0.65rem;font-weight:900;color:#fff;letter-spacing:1.5px;text-transform:uppercase;}
.qc-prog{font-size:0.62rem;color:rgba(255,255,255,0.6);font-weight:700;}
.qc-body{padding:13px 14px;}
.q-q{font-size:0.82rem;font-weight:700;line-height:1.5;margin-bottom:10px;padding:8px 11px;background:var(--bg);border-radius:7px;border-left:2.5px solid var(--navy);}
.q-opt{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:0.78rem;font-weight:700;cursor:pointer;margin-bottom:6px;width:100%;text-align:left;color:var(--navy);display:flex;align-items:center;gap:9px;transition:all 0.13s;font-family:'Nunito',sans-serif;}
.q-opt:last-child{margin-bottom:0;}
.q-opt:hover:not(:disabled){border-color:var(--navy);background:var(--white);}
.q-opt.ok{background:#f0fdf4;border-color:var(--green);color:var(--green);}
.q-opt.no{background:#fef2f2;border-color:var(--red);color:var(--red);}
.q-opt:disabled{cursor:default;}
.q-ltr{width:20px;height:20px;border-radius:50%;background:rgba(26,46,74,0.1);display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:900;color:var(--navy);flex-shrink:0;transition:all 0.13s;}
.q-opt.ok .q-ltr{background:var(--green);color:#fff;}
.q-opt.no .q-ltr{background:var(--red);color:#fff;}
.q-fb{font-size:0.72rem;font-weight:700;margin-top:8px;padding:7px 10px;border-radius:7px;display:none;line-height:1.5;}
.q-fb.show{display:block;}
.q-fb.ok{background:#f0fdf4;border:1px solid #86efac;color:var(--green);}
.q-fb.no{background:#fef2f2;border:1px solid #fca5a5;color:var(--red);}
.q-next{margin-top:8px;width:100%;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:900;cursor:pointer;display:none;transition:all 0.15s;}
.q-next:hover{background:#2a4a6a;}
.q-next.show{display:block;}
.q-done{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:12px;text-align:center;font-size:0.8rem;font-weight:700;color:var(--green);display:none;}
.q-done.show{display:block;}

/* FOOTER */
.footer{display:flex;align-items:center;justify-content:space-between;}
.f-txt{font-size:0.58rem;color:var(--muted);font-weight:700;letter-spacing:1.5px;}
.f-dots{display:flex;gap:4px;}
.f-d{width:6px;height:6px;border-radius:50%;background:rgba(26,46,74,0.15);}
.f-d.on{background:var(--navy);}

@media(max-width:640px){
  .main{grid-template-columns:1fr;}
  .cards-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div>
    <div class="h-title">Tachograf i karta kierowcy</div>
    <div class="h-sub">Lekcja 16 · Moduł 3 · Angielski z Mareczkiem · Crosshaul</div>
  </div>
  <div class="h-badge">16 / 30</div>
</div>

<div class="prog-row">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-txt" id="progTxt">0 / 8 odkrytych</div>
</div>

<div class="main">

  <!-- SIATKA KART -->
  <div>
    <div style="font-size:0.6rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">Kliknij kartę — poznaj termin i frazę</div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <!-- PRAWY PANEL -->
  <div class="right-col">
    <div class="active-card">
      <div class="ac-head" id="acHead" style="background:var(--navy);color:rgba(255,255,255,0.5);">Aktywna karta</div>
      <div class="ac-body" id="acBody">
        <div class="ac-empty">← Kliknij kartę<br>żeby poznać termin</div>
      </div>
    </div>
    
  </div>
</div>

<!-- QUIZ -->
<div class="quiz-card" style="margin-bottom:14px;">
  <div class="qc-head">
    <div class="qc-title">Quiz</div>
    <div class="qc-prog" id="qprog">1 / 6</div>
  </div>
  <div class="qc-body">
    <div class="q-q" id="qq"></div>
    <div id="qopts"></div>
    <div class="q-fb" id="qfb"></div>
    <button class="q-next" id="qnext" onclick="nextQ()">DALEJ →</button>
    <div class="q-done" id="qdone">✅ Lekcja 16 ukończona! Znasz terminologię tachografu.</div>
  </div>
</div>

<div class="footer">
  <div class="f-txt">ANGIELSKI Z MARECZKIEM · CROSSHAUL</div>
  <div class="f-dots">
    <div class="f-d"></div><div class="f-d"></div><div class="f-d"></div><div class="f-d on"></div><div class="f-d"></div>
  </div>
</div>

</div>

<script>
const cards = [
  {
    id:1,
    en:'Driver card',
    pl:'Karta kierowcy',
    color:'#1a2e4a',
    tag:'DOKUMENT',
    tagColor:'rgba(26,46,74,0.1)',
    tagText:'#1a2e4a',
    desc:'Cyfrowa karta identyfikacyjna kierowcy wkładana do tachografu. Rejestruje czas jazdy, przerwy i odpoczynki.',
    phrase:'"Here is my driver card."',
    phrasePl:'Proszę moja karta kierowcy.',
    tip:'Inspektor zawsze zaczyna od prośby o kartę kierowcy. Miej ją zawsze przy sobie!',
  },
  {
    id:2,
    en:'Driving time',
    pl:'Czas jazdy',
    color:'#d63528',
    tag:'CZAS',
    tagColor:'rgba(214,53,40,0.1)',
    tagText:'#d63528',
    desc:'Łączny czas prowadzenia pojazdu. Max 9h dziennie (wyjątkowo 10h max 2x w tygodniu). Max 56h tygodniowo.',
    phrase:'"My total driving time today is eight hours."',
    phrasePl:'Mój łączny czas jazdy dziś wynosi 8 godzin.',
    tip:'Daily driving time = dzienny czas jazdy. Max 9 hours = maksymalnie 9 godzin.',
  },
  {
    id:3,
    en:'Rest period',
    pl:'Okres odpoczynku',
    color:'#15803d',
    tag:'ODPOCZYNEK',
    tagColor:'rgba(21,128,61,0.1)',
    tagText:'#15803d',
    desc:'Czas gdy kierowca odpoczywa — nie prowadzi i nie wykonuje żadnej pracy. Min. 11h dziennie, 45h tygodniowo.',
    phrase:'"I took my daily rest of eleven hours."',
    phrasePl:'Wziąłem dzienny odpoczynek 11 godzin.',
    tip:'Daily rest = dzienny odpoczynek. Weekly rest = tygodniowy odpoczynek. Min 11 hours daily.',
  },
  {
    id:4,
    en:'Break',
    pl:'Przerwa',
    color:'#e07820',
    tag:'PRZERWA',
    tagColor:'rgba(224,120,32,0.1)',
    tagText:'#e07820',
    desc:'Obowiązkowa przerwa po 4,5h jazdy. Min 45 minut — można podzielić: najpierw 15 minut, potem 30 minut.',
    phrase:'"I took a 45-minute break after four and a half hours of driving."',
    phrasePl:'Wziąłem 45-minutową przerwę po 4,5h jazdy.',
    tip:'Break = przerwa (nie odpoczynek!). Po 4.5h jazdy obowiązkowo 45 min przerwy.',
  },
  {
    id:5,
    en:'Printout',
    pl:'Wydruk z tachografu',
    color:'#0891b2',
    tag:'DOKUMENT',
    tagColor:'rgba(8,145,178,0.1)',
    tagText:'#0891b2',
    desc:'Wydruk papierowy z cyfrowego tachografu pokazujący dane z karty kierowcy. Inspektor może go zażądać.',
    phrase:'"I can print it out for you right now."',
    phrasePl:'Mogę to teraz dla Pana wydrukować.',
    tip:'Printout = wydruk. I can print it out = mogę wydrukować. Zawsze miej papier w tachografie!',
  },
  {
    id:6,
    en:'Infringement',
    pl:'Naruszenie przepisów',
    color:'#d63528',
    tag:'NARUSZENIE',
    tagColor:'rgba(214,53,40,0.1)',
    tagText:'#d63528',
    desc:'Przekroczenie limitów czasu jazdy lub odpoczynku. Może skutkować mandatem lub zatrzymaniem pojazdu.',
    phrase:'"I was not aware of the infringement."',
    phrasePl:'Nie byłem świadomy naruszenia.',
    tip:'Infringement = naruszenie. I was not aware = nie byłem świadomy. Nie przyznawaj się bez konsultacji z firmą!',
  },
  {
    id:7,
    en:'Weekly rest',
    pl:'Odpoczynek tygodniowy',
    color:'#7c3aed',
    tag:'ODPOCZYNEK',
    tagColor:'rgba(124,58,237,0.1)',
    tagText:'#7c3aed',
    desc:'Odpoczynek tygodniowy: regularny min 45h lub skrócony min 24h (z uzupełnieniem w ciągu 3 tygodni).',
    phrase:'"My weekly rest started on Friday evening."',
    phrasePl:'Mój odpoczynek tygodniowy zaczął się w piątek wieczorem.',
    tip:'Weekly rest = odpoczynek tygodniowy. Regular = regularny (45h). Reduced = skrócony (24h).',
  },
  {
    id:8,
    en:'Manual entry',
    pl:'Wpis ręczny',
    color:'#888',
    tag:'PROCEDURA',
    tagColor:'rgba(100,100,100,0.1)',
    tagText:'#555',
    desc:'Ręczne wprowadzenie danych do tachografu gdy karta była wyjęta np. podczas odpoczynku na promie.',
    phrase:'"I made a manual entry for the ferry crossing."',
    phrasePl:'Zrobiłem wpis ręczny za czas przeprawy promowej.',
    tip:'Manual entry = wpis ręczny. Wymagany gdy karta była wyjęta z tachografu (np. prom, serwis).',
  },
];

let seen = new Set();
let currentId = null;

function buildCards() {
  const g = document.getElementById('cardsGrid');
  g.innerHTML = cards.map(c => `
    <div class="doc-card" id="dc${c.id}" onclick="activate(${c.id})">
      <div class="dc-num">KARTA ${c.id} / 8</div>
      <div class="dc-en">${c.en}</div>
      <div class="dc-pl">${c.pl}</div>
      <div class="dc-tag" style="background:${c.tagColor};color:${c.tagText};">${c.tag}</div>
      <div class="dc-check">✓</div>
    </div>
  `).join('');
}

function activate(id) {
  if(currentId) document.getElementById('dc'+currentId)?.classList.remove('active');
  currentId = id;
  document.getElementById('dc'+id).classList.add('active');

  if(!seen.has(id)) {
    seen.add(id);
    document.getElementById('dc'+id).classList.add('seen');
    updateProgress();
  }

  const c = cards.find(x=>x.id===id);
  document.getElementById('acHead').style.background = c.color;
  document.getElementById('acHead').style.color = '#fff';
  document.getElementById('acHead').textContent = c.tag;

  // ZMIANA: Klikalne główne słówko (ac-en) i wywołanie speakPhrase(id) dla zdania
  document.getElementById('acBody').innerHTML = `
    <div class="ac-num" style="background:${c.tagColor};color:${c.tagText};">KARTA ${c.id} / 8</div>
    <div class="ac-pl">${c.pl}</div>
    <div class="ac-section">
      <div class="ac-section-label">Co powiedzieć inspektorowi</div>
      <div class="ac-phrase">${c.phrase}</div>
      <div class="ac-phrase-pl">${c.phrasePl}</div>
    </div>
    <div class="ac-section">
      <div class="ac-desc" style="border-left:2.5px solid ${c.color};padding-left:10px;background:none;">💡 ${c.tip}</div>
    </div>
    <button class="ac-sound" id="acSnd" onclick="speakPhrase(${c.id})">🔊 Posłuchaj całego zdania</button>
  `;
}

function updateProgress() {
  const pct = (seen.size / 8) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = `${seen.size} / 8 odkrytych`;
}

/* QUIZ */
const qs = [
  {q:'Inspektor pyta: "Show me your driver card." Co podajesz?',
   opts:['CMR i list przewozowy','Kartę kierowcy z tachografu','Dowód rejestracyjny','Prawo jazdy kategorii C'],
   and:1,tip:'Driver card = karta kierowcy. Zawsze miej ją przy sobie i gotową do pokazania!'},
  {q:'Co to jest "infringement"?',
   opts:['Wydruk z tachografu','Przerwa obowiązkowa','Naruszenie przepisów o czasie jazdy','Odpoczynek tygodniowy'],
   and:2,tip:'Infringement = naruszenie. Np. przekroczenie czasu jazdy lub zbyt krótki odpoczynek.'},
  {q:'Po ilu godzinach jazdy obowiązkowa przerwa "break"?',
   opts:['Po 6 godzinach','Po 8 godzinach','Po 4,5 godzinach','Po 5 godzinach'],
   and:2,tip:'Break wymagany po 4.5h (four and a half hours) jazdy. Minimum 45 minut.'},
  {q:'Inspektor prosi o "printout". Co robisz?',
   opts:['Pokazujesz kartę kierowcy','Drukujesz wydruk z tachografu','Pokazujesz CMR','Dzwonisz do dyspozytora'],
   and:1,tip:'Printout = wydruk z tachografu. I can print it out for you = mogę to wydrukować.'},
  {q:'Jaki jest minimalny dzienny "rest period"?',
   opts:['8 godzin','9 godzin','11 godzin','45 minut'],
   and:2,tip:'Daily rest = dzienny odpoczynek = minimum 11 godzin. Eleven hours minimum daily rest.'},
  {q:'Kiedy robisz "manual entry"?',
   opts:['Gdy tachograf się zepsuje','Gdy karta była wyjęta np. na promie','Przy każdym postoju','Przy przekroczeniu granicy'],
   and:1,tip:'Manual entry = wpis ręczny. Wymagany gdy karta była wyjęta z tachografu np. podczas przeprawy promowej.'},
];
let qi = 0;

function renderQ() {
  if(qi >= qs.length) {
    document.getElementById('qq').style.display='none';
    document.getElementById('qopts').innerHTML='';
    document.getElementById('qfb').className='q-fb';
    document.getElementById('qnext').classList.remove('show');
    document.getElementById('qprog').textContent='';
    document.getElementById('qdone').classList.add('show');
    return;
  }
  const q = qs[qi];
  document.getElementById('qprog').textContent = `${qi+1} / ${qs.length}`;
  document.getElementById('qq').textContent = q.q;
  document.getElementById('qfb').className = 'q-fb';
  document.getElementById('qnext').classList.remove('show');
  document.getElementById('qopts').innerHTML = q.opts.map((o,i) => `
    <button class="q-opt" onclick="qa(this,${i===q.and})">
      <div class="q-ltr">${['A','B','C','D'][i]}</div>${o}
    </button>
  `).join('');
}

function qa(btn, c) {
  document.querySelectorAll('.q-opt').forEach(b=>b.disabled=true);
  const fb = document.getElementById('qfb');
  if(c){btn.classList.add('ok');fb.className='q-fb show ok';fb.textContent='✅ '+qs[qi].tip;}
  else{btn.classList.add('no');document.querySelectorAll('.q-opt')[qs[qi].and].classList.add('ok');fb.className='q-fb show no';fb.textContent='❌ '+qs[qi].tip;}
  qi++;
  document.getElementById('qnext').classList.add('show');
}
function nextQ(){renderQ();}

/* ════════════════════════════════════════════════════════════
   NOWY SYSTEM AUDIO (MP3 Z ZABEZPIECZENIEM CACHE, BEZ SPACJI)
════════════════════════════════════════════════════════════ */
const AUDIO_MAP = {
  // Pełne zdania
  'Here is my driver card.': 'audio/L16/here_is_my_driver_card_l16.mp3',
  'My total driving time today is eight hours.': 'audio/L16/my_total_driving_time_today_is_eight_hours_l16.mp3',
  'I took my daily rest of eleven hours.': 'audio/L16/i_took_my_daily_rest_of_eleven_hours_l16.mp3',
  'I took a 45-minute break after four and a half hours of driving.': 'audio/L16/i_took_a_45_minute_break_after_four_and_a_half_hours_of_driving_l16.mp3',
  'I can print it out for you right now.': 'audio/L16/i_can_print_it_out_for_you_right_now_l16.mp3',
  'I was not aware of the infringement.': 'audio/L16/i_was_not_aware_of_the_infringement_l16.mp3',
  'My weekly rest started on Friday evening.': 'audio/L16/my_weekly_rest_started_on_friday_evening_l16.mp3',
  'I made a manual entry for the ferry crossing.': 'audio/L16/i_made_a_manual_entry_for_the_ferry_crossing_l16.mp3',
};

let _ap = null;

function _playAudio(text, btn, label) {
  // Usuwanie cudzysłowów
  const clean = text.replace(/[\u201c\u201d\u201e"]/g, '').trim();
  
  if(_ap) { 
    _ap.pause(); 
    _ap.currentTime = 0;
    _ap = null; 
  }
  
  const mp3 = AUDIO_MAP[clean];
  const lbl = label || '🔊 Wymowa';

  if (btn) {
    btn.classList.add('pl');
    btn.textContent = '⌛ Ładowanie...';
  }

  if (mp3) {
    const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const timestamp = new Date().getTime(); 
    const audioUrl = currentPath + encodeURIComponent(mp3) + "?v=" + timestamp;

    _ap = new Audio(audioUrl);

    const watchdog = setTimeout(() => {
      if (btn && btn.classList.contains("pl")) {
        resetBtn();
      }
    }, 4000);

    function resetBtn() {
      clearTimeout(watchdog);
      if (btn) {
        btn.classList.remove('pl');
        btn.textContent = lbl;
      }
    }

    _ap.onplay = () => { if (btn) btn.textContent = '🔊 Odtwarzam...'; };
    _ap.onended = resetBtn;
    _ap.onerror = () => {
      console.warn("Błąd ładowania MP3, powrót do WebSpeech:", audioUrl);
      clearTimeout(watchdog);
      _webSpeech(clean, btn, lbl); 
    };
    _ap.play().catch((err) => {
      console.warn("Autoplay zablokowany:", err);
      _webSpeech(clean, btn, lbl);
    });

  } else {
    console.warn("Brak pliku MP3 dla tekstu:", clean);
    _webSpeech(clean, btn, lbl);
  }
}

function _webSpeech(text, btn, label){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const lbl = label || '🔊 Wymowa';
  if(btn){ btn.classList.add('pl'); btn.textContent='🔊 Odtwarzam (Bot)...'; }
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-GB'; u.rate=0.78;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(x=>x.name==='Google UK English Female')
      || voices.find(x=>x.lang==='en-GB')
      || voices.find(x=>x.lang.startsWith('en'));
    if(v) u.voice=v;
    u.onend = ()=>{ if(btn){ btn.classList.remove('pl'); btn.textContent = lbl; } };
    u.onerror = ()=>{ if(btn){ btn.classList.remove('pl'); btn.textContent = lbl; } };
    window.speechSynthesis.speak(u);
  }, 300);
}

// Wywoływane po kliknięciu przycisku "Posłuchaj całego zdania"
function speakPhrase(id) {
  const text = cards.find(c => c.id === id).phrase;
  const btn = document.getElementById('acSnd');
  _playAudio(text, btn, '🔊 Posłuchaj całego zdania');
}

// Wywoływane po kliknięciu tytułu karty "Posłuchaj wymowy słówka"
function speakVocab(id) {
  const text = cards.find(c => c.id === id).en;
  // Przekazujemy null jako przycisk, bo to tylko krótki text klikany w tekście
  _playAudio(text, null, null);
}

buildCards();
renderQ();
