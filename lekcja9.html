<script>
/* ════════════════
   STAN GRY
════════════════ */
let matched = 0;
let r1Score = 0;
let r2Score = 0;
let r2Total = 0;
let dragged = null;

/* ════════════════
   RUNDA 1 — DRAG & DROP
════════════════ */
function dragStart(e, word) {
  dragged = word;
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function dragEnd(e) {
  e.target.classList.remove('dragging');
}

function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('over');
}

function drop(e) {
  e.preventDefault();
  const zone = e.currentTarget;
  zone.classList.remove('over');
  if(!dragged) return;
  if(zone.classList.contains('correct')) return;

  const answer = zone.dataset.answer;

  if(dragged === answer) {
    /* POPRAWNIE */
    zone.classList.add('correct');
    r1Score++;
    matched++;

    /* Oznacz słówko jako dopasowane */
    const wordEl = document.querySelector(`[data-word="${dragged}"]`);
    if(wordEl) wordEl.classList.add('matched');

    updateProgress();

    /* Wszystkie 8 dopasowane → przejdź do rundy 2 */
    if(matched === 8) {
      setTimeout(() => {
        document.getElementById('r1Score').textContent = `✓ Wszystkie dopasowane! Wynik: ${r1Score}/8`;
        document.getElementById('r1Score').style.color = 'var(--green)';
        setTimeout(startRound2, 900);
      }, 400);
    }
  } else {
    /* BŁĘDNIE */
    zone.classList.add('wrong');
    setTimeout(() => zone.classList.remove('wrong'), 600);
  }

  dragged = null;
}

/* Touch support */
let touchDragged = null;
let touchClone = null;

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.word-item').forEach(item => {
    item.addEventListener('touchstart', touchStart, {passive:false});
    item.addEventListener('touchmove', touchMove, {passive:false});
    item.addEventListener('touchend', touchEnd, {passive:false});
  });
});

function touchStart(e) {
  if(this.classList.contains('matched')) return;
  e.preventDefault();
  touchDragged = this.dataset.word;
  touchClone = this.cloneNode(true);
  touchClone.style.cssText = `
    position:fixed;pointer-events:none;z-index:9999;
    opacity:0.85;width:${this.offsetWidth}px;
    border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,0.15);
    background:#fff;border:1.5px solid #1a2e4a;
    padding:12px 14px;font-family:'Courier Prime',monospace;
    font-size:0.9rem;font-weight:700;color:#1a2e4a;
    display:flex;align-items:center;gap:10px;
  `;
  document.body.appendChild(touchClone);
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - touchClone.offsetWidth/2) + 'px';
  touchClone.style.top  = (t.clientY - 25) + 'px';
}

function touchMove(e) {
  e.preventDefault();
  if(!touchClone) return;
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - touchClone.offsetWidth/2) + 'px';
  touchClone.style.top  = (t.clientY - 25) + 'px';
  /* Podświetl strefę */
  document.querySelectorAll('.def-drop').forEach(z=>z.classList.remove('over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el?.closest('.def-drop');
  if(zone && !zone.classList.contains('correct')) zone.classList.add('over');
}

function touchEnd(e) {
  e.preventDefault();
  if(touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.def-drop').forEach(z=>z.classList.remove('over'));
  if(!touchDragged) return;
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el?.closest('.def-drop');
  if(zone) {
    const fakeE = { preventDefault:()=>{}, currentTarget:zone, target:zone };
    dragged = touchDragged;
    drop(fakeE);
  }
  touchDragged = null;
}

/* ════════════════
   RUNDA 2 — FRAZY
════════════════ */
const phrases = [
  {
    ctx: "Przyjazd do magazynu",
    q: "Chcesz zapytać gdzie jest rampa załadunkowa. Co mówisz?",
    opts: [
      { t: "Where is the loading dock?", correct: true },
      { t: "Where is the supermarket?", correct: false },
      { t: "Where is the coffee machine?", correct: false },
    ],
    tip: "Where is the loading dock? = Gdzie jest rampa załadunkowa?",
  },
  {
    ctx: "Cofanie do rampy",
    q: "Hans prosi żebyś podłożył kliny pod koła. Potwierdzasz:",
    opts: [
      { t: "I will do it later.", correct: false },
      { t: "Wheel chocks are placed. Ready!", correct: true },
      { t: "Chocks? I don't understand.", correct: false },
    ],
    tip: "Wheel chocks are placed = Kliny pod koła podłożone. Zawsze potwierdzaj wykonanie czynności!",
  },
  {
    ctx: "Rozładunek",
    q: "Wózek widłowy jest zajęty. Hans mówi żebyś użył windy. Pytasz czy działa:",
    opts: [
      { t: "Is the tail lift working?", correct: true },
      { t: "Is the forklift available?", correct: false },
      { t: "Is the warehouse open?", correct: false },
    ],
    tip: "Is the tail lift working? = Czy winda załadunkowa działa? Zawsze sprawdzaj sprzęt przed użyciem!",
  },
  {
    ctx: "Koniec rozładunku",
    q: "Hans pyta o number stanowiska przy wyjeździe. Odpowiadasz:",
    opts: [
      { t: "I was at loading bay seven.", correct: true },
      { t: "I was at the warehouse exit.", correct: false },
      { t: "I don't remember the number.", correct: false },
    ],
    tip: "I was at loading bay seven = Byłem na stanowisku number siedem. Zawsze zapamiętaj number doku!",
  },
];

let phraseAnswered = 0;

function startRound2() {
  document.getElementById('round1').style.display = 'none';
  document.getElementById('round2').style.display = 'block';
  document.getElementById('progTxt').textContent = 'RUNDA 2 / 2';
  document.getElementById('progFill').style.width = '50%';

  const container = document.getElementById('phraseGame');
  container.innerHTML = phrases.map((p, pi) => `
    <div class="phrase-situation" id="ps${pi}">
      <div class="ps-context">${p.ctx}</div>
      <div class="ps-question">${p.q}</div>
      <div class="phrase-options">
        ${p.opts.map((o,oi) => `
          <button class="phrase-opt" onclick="pickPhrase(${pi},${oi},${o.correct})"
            id="po${pi}_${oi}">
            <div class="po-letter">${['A','B','C'][oi]}</div>
            ${o.t}
            <button class="phrase-sound" onclick="event.stopPropagation();speakPhrase('${o.t.replace(/'/g,"\\'")}', this)" tabindex="-1">🔊</button>
          </button>
        `).join('')}
      </div>
      <div class="phrase-feedback" id="pf${pi}"></div>
    </div>
  `).join('');
}

function pickPhrase(pi, oi, correct) {
  const allOpts = document.querySelectorAll(`#ps${pi} .phrase-opt`);
  allOpts.forEach(b => b.disabled = true);
  const btn = document.getElementById(`po${pi}_${oi}`);
  const fb  = document.getElementById(`pf${pi}`);

  if(correct) {
    btn.classList.add('ok');
    fb.className = 'phrase-feedback show ok';
    fb.textContent = '✅ ' + phrases[pi].tip;
    r2Score++;
  } else {
    btn.classList.add('no');
    /* Pokaż poprawną */
    const correctIdx = phrases[pi].opts.findIndex(o => o.correct);
    document.getElementById(`po${pi}_${correctIdx}`).classList.add('ok');
    fb.className = 'phrase-feedback show no';
    fb.textContent = '❌ ' + phrases[pi].tip;
  }
  r2Total++;
  phraseAnswered++;
  updateProgress();

  if(phraseAnswered === phrases.length) {
    setTimeout(() => {
      document.getElementById('r2Actions').style.display = 'flex';
    }, 600);
  }
}

/* ════════════════
   KONIEC
════════════════ */
function updateProgress() {
  const total = 8 + phrases.length;
  const done  = matched + phraseAnswered;
  const pct   = Math.round((done / total) * 100);
  document.getElementById('progFill').style.width = pct + '%';
}

function showEnd() {
  document.getElementById('round2').style.display = 'none';
  document.getElementById('endWrap').classList.add('show');
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progTxt').textContent = 'UKOŃCZONO';

  document.getElementById('sc1').textContent = `${r1Score}/8`;
  document.getElementById('sc2').textContent = `${r2Score}/${phrases.length}`;
  document.getElementById('scTotal').textContent = `${r1Score+r2Score}/${8+phrases.length}`;

  const total = r1Score + r2Score;
  const max   = 8 + phrases.length;
  if(total === max) {
    document.getElementById('endIcon').textContent = '🏆';
    document.getElementById('endTitle').textContent = 'Wynik idealny!';
    document.getElementById('endSub').textContent  = 'Perfekcyjnie znasz słownictwo rampy';
  } else if(total >= max*0.75) {
    document.getElementById('endIcon').textContent = '🥈';
    document.getElementById('endTitle').textContent = 'Dobry wynik!';
    document.getElementById('endSub').textContent  = 'Prawie perfekcyjnie — spróbuj jeszcze raz';
  } else {
    document.getElementById('endIcon').textContent = '💪';
    document.getElementById('endTitle').textContent = 'Ćwicz dalej!';
    document.getElementById('endSub').textContent  = 'Powtórz lekcję żeby utrwalić słownictwo';
  }
}

function restart() {
  matched = 0; r1Score = 0; r2Score = 0; r2Total = 0; phraseAnswered = 0;
  /* Reset drag */
  document.querySelectorAll('.word-item').forEach(el=>{
    el.classList.remove('matched','dragging');
    el.draggable = true;
  });
  document.querySelectorAll('.def-drop').forEach(el=>{
    el.classList.remove('correct','wrong','over');
  });
  document.getElementById('r1Score').textContent = 'Przeciągnij słówka do odpowiednich definicji →';
  document.getElementById('r1Score').style.color = 'var(--muted)';
  /* Pokaż rundę 1 */
  document.getElementById('endWrap').classList.remove('show');
  document.getElementById('round2').style.display = 'none';
  document.getElementById('round1').style.display = 'block';
  document.getElementById('r2Actions').style.display = 'none';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progTxt').textContent = 'RUNDA 1 / 2';
}

/* ════════════════════════════════════════════════════════════
   NOWY SYSTEM AUDIO (MP3 Z ZABEZPIECZENIEM CACHE, BEZ SPACJI)
════════════════════════════════════════════════════════════ */
const AUDIO_MAP = {
  // Słówka Runda 1 / Ekran końcowy
  'loading dock': 'audio/L9/loading_dock_l9.mp3',
  'forklift': 'audio/L9/forklift_l9.mp3',
  'tail lift': 'audio/L9/tail_lift_l9.mp3',
  'pallet': 'audio/L9/pallet_l9.mp3',
  'dock bumper': 'audio/L9/dock_bumper_l9.mp3',
  'warehouse': 'audio/L9/warehouse_l9.mp3',
  'wheel chocks': 'audio/L9/wheel_chocks_l9.mp3',
  'loading bay': 'audio/L9/loading_bay_l9.mp3',

  // Frazy Runda 2
  'Where is the loading dock?': 'audio/L9/where_is_the_loading_dock_l9.mp3',
  'Where is the supermarket?': 'audio/L9/where_is_the_supermarket_l9.mp3',
  'Where is the coffee machine?': 'audio/L9/where_is_the_coffee_machine_l9.mp3',
  'I will do it later.': 'audio/L9/i_will_do_it_later_l9.mp3',
  'Wheel chocks are placed. Ready!': 'audio/L9/wheel_chocks_are_placed_ready_l9.mp3',
  'Chocks? I don\'t understand.': 'audio/L9/chocks_i_dont_understand_l9.mp3',
  'Is the tail lift working?': 'audio/L9/is_the_tail_lift_working_l9.mp3',
  'Is the forklift available?': 'audio/L9/is_the_forklift_available_l9.mp3',
  'Is the warehouse open?': 'audio/L9/is_the_warehouse_open_l9.mp3',
  'I was at loading bay seven.': 'audio/L9/i_was_at_loading_bay_seven_l9.mp3',
  'I was at the warehouse exit.': 'audio/L9/i_was_at_the_warehouse_exit_l9.mp3',
  'I don\'t remember the number.': 'audio/L9/i_dont_remember_the_number_l9.mp3'
};

let _ap = null;

function _playAudio(text, btn, label) {
  const clean = text.replace(/[\u201c\u201d\u201e"]/g, '').trim();
  
  if(_ap) { 
    _ap.pause(); 
    _ap.currentTime = 0;
    _ap = null; 
  }
  
  const mp3 = AUDIO_MAP[clean];
  const lbl = label || '🔊';

  if (btn) {
    btn.classList.add('playing');
    btn.textContent = '⌛';
  }

  if (mp3) {
    const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const timestamp = new Date().getTime(); 
    const audioUrl = currentPath + encodeURIComponent(mp3) + "?v=" + timestamp;

    _ap = new Audio(audioUrl);

    const watchdog = setTimeout(() => {
      if (btn && btn.classList.contains("playing")) {
        resetBtn();
      }
    }, 4000);

    function resetBtn() {
      clearTimeout(watchdog);
      if (btn) {
        btn.classList.remove('playing');
        btn.textContent = lbl;
      }
    }

    _ap.onplay = () => {
      if (btn) btn.textContent = '🔊';
    };

    _ap.onended = resetBtn;

    _ap.onerror = () => {
      console.warn("Błąd ładowania MP3, powrót do WebSpeech:", audioUrl);
      clearTimeout(watchdog);
      _webSpeech(clean, btn, lbl); 
    };

    _ap.play().catch((err) => {
      console.warn("Autoplay zablokowany:", err);
      _webSpeech(clean, btn, lbl);
    });

  } else {
    console.warn("Brak pliku MP3 dla:", clean);
    _webSpeech(clean, btn, lbl);
  }
}

function _webSpeech(text, btn, label){
  if(!('speechSynthesis' in window)) {
      if(btn) { btn.classList.remove('playing'); btn.textContent = "❌"; }
      return;
  }
  window.speechSynthesis.cancel();
  const lbl = label || '🔊';
  if(btn){ 
    btn.classList.add('playing'); 
    btn.textContent = '🔊'; 
  }
  
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-GB'; u.rate=0.78;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(x=>x.name==='Google UK English Female')
      || voices.find(x=>x.lang==='en-GB')
      || voices.find(x=>x.lang.startsWith('en'));
    if(v) u.voice=v;
    u.onend  = ()=>{ if(btn){ btn.classList.remove('playing'); btn.textContent = lbl; } };
    u.onerror= ()=>{ if(btn){ btn.classList.remove('playing'); btn.textContent = lbl; } };
    window.speechSynthesis.speak(u);
  }, 300);
}

// Interfejsy dla przycisków
function speakText(text, btn) {
  _playAudio(text, btn, '🔊');
}

function speakPhrase(text, btn) {
  _playAudio(text, btn, '🔊');
}

function speakWord(word) {
  _playAudio(word, null, null);
}

// Podpięcie słownika na ekranie końcowym
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".vocab-summary .vs-row").forEach(row => {
        let enWord = row.querySelector(".vs-en").textContent;
        row.style.cursor = "pointer";
        row.onclick = () => speakWord(enWord);
        row.addEventListener('mouseover', () => row.style.background = 'rgba(26,46,74,0.05)');
        row.addEventListener('mouseout', () => row.style.background = 'transparent');
    });
});

</script>
