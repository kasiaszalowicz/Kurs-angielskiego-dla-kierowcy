<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekcja 19 - Zezwolenia i tranzyt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#1a2e4a;--red:#d63528;--green:#15803d;--bg:#f5f2ec;--white:#fff;--border:#e0dbd0;--muted:#888;--orange:#e07820;}
body{background:var(--bg);font-family:'Nunito',sans-serif;min-height:100vh;padding:20px 16px;color:var(--navy);}
.wrap{max-width:620px;margin:0 auto;}
.header{background:var(--navy);border-radius:12px;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.h-title{font-size:1rem;font-weight:900;color:#fff;}
.h-sub{font-size:0.67rem;color:rgba(255,255,255,0.4);font-weight:700;margin-top:2px;}
.h-badge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:0.65rem;font-weight:700;padding:4px 12px;border-radius:20px;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.prog-bar{flex:1;height:4px;background:rgba(26,46,74,0.1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--navy),var(--orange));border-radius:99px;transition:width 0.5s;}
.prog-txt{font-size:0.65rem;font-weight:900;color:var(--muted);letter-spacing:1px;white-space:nowrap;}
.q-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:12px;}
.qc-bar{height:5px;background:linear-gradient(90deg,var(--navy),var(--orange));}
.qc-head{background:var(--navy);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;}
.qc-num{font-size:0.6rem;font-weight:900;color:rgba(255,255,255,0.4);letter-spacing:2px;}
.qc-pts{font-size:0.65rem;font-weight:900;color:rgba(255,255,255,0.6);}
.qc-body{padding:28px 24px;}
.word-en{font-family:'Courier Prime',monospace;font-size:2.2rem;font-weight:700;color:var(--navy);text-align:center;margin-bottom:8px;}
.snd-btn{display:flex;align-items:center;justify-content:center;margin-bottom:22px;}
.snd-btn button{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:700;color:var(--navy);cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;}
.snd-btn button:hover{border-color:var(--navy);}
.snd-btn button.playing{background:var(--navy);color:#fff;border-color:var(--navy);}
.translation-box{border:2px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:24px;transition:all 0.2s;background:var(--bg);}
.translation-box.ok{border-color:var(--green);background:#f0fdf4;}
.translation-box.no{border-color:var(--red);background:#fef2f2;}
.tb-q{font-size:0.62rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.tb-pl{font-size:1.4rem;font-weight:900;color:var(--navy);}
.translation-box.ok .tb-pl{color:var(--green);}
.translation-box.no .tb-pl{color:var(--red);}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.btn-tf{border:2px solid var(--border);border-radius:10px;padding:18px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;transition:all 0.15s;background:var(--white);color:var(--navy);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-tf:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.1);}
.true-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);}
.false-btn:hover:not(:disabled){border-color:var(--red);color:var(--red);}
.btn-tf.sel-ok{border-color:var(--green);background:#f0fdf4;color:var(--green);}
.btn-tf.sel-no{border-color:var(--red);background:#fef2f2;color:var(--red);animation:shake 0.3s;}
.btn-tf.reveal{border-color:var(--green);background:#f0fdf4;color:var(--green);}
.btn-tf:disabled{cursor:default;transform:none;box-shadow:none;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.feedback{padding:12px 14px;border-radius:9px;font-size:0.8rem;font-weight:700;line-height:1.6;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#f0fdf4;border:1.5px solid #86efac;color:var(--green);}
.feedback.no{background:#fef2f2;border:1.5px solid #fca5a5;color:var(--red);}
.fb-ans{font-family:'Courier Prime',monospace;display:block;margin-top:5px;font-size:0.85rem;color:var(--navy);}
.btn-next{width:100%;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:13px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:900;cursor:pointer;transition:all 0.15s;margin-top:10px;display:none;}
.btn-next:hover{background:#2a4a6a;}
.btn-next.show{display:block;}
.dots{display:flex;justify-content:center;gap:5px;padding:14px 0 2px;}
.sd{width:8px;height:8px;border-radius:50%;background:rgba(26,46,74,0.15);transition:all 0.3s;}
.sd.on{background:var(--navy);width:20px;border-radius:99px;}
.sd.g{background:var(--green);}
.sd.r{background:var(--red);}
.end-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:28px 24px;text-align:center;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:14px;}
.end-card.show{display:block;}
.end-icon{font-size:3rem;margin-bottom:10px;}
.end-title{font-size:1.3rem;font-weight:900;color:var(--navy);margin-bottom:6px;}
.end-sub{font-size:0.8rem;color:var(--muted);margin-bottom:18px;}
.sc-box{display:inline-block;background:var(--bg);border-radius:10px;padding:14px 32px;border:1.5px solid var(--border);margin-bottom:20px;}
.sc-num{font-size:2.2rem;font-weight:900;color:var(--navy);}
.sc-lbl{font-size:0.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.vocab-box{background:var(--bg);border-radius:10px;padding:13px 15px;text-align:left;margin-bottom:18px;}
.vb-title{font-size:0.6rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:9px;}
.vb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.vb-row{display:flex;align-items:center;gap:6px;font-size:0.73rem;cursor:pointer;padding:4px 5px;border-radius:5px;transition:all 0.13s;}
.vb-row:hover{background:rgba(26,46,74,0.05);}
.vb-dot{width:6px;height:6px;border-radius:50%;background:var(--navy);flex-shrink:0;}
.vb-en{font-family:'Courier Prime',monospace;font-weight:700;color:var(--navy);}
.vb-pl{font-size:0.63rem;color:var(--muted);}
.btn-restart{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:12px 30px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:900;cursor:pointer;}
.btn-restart:hover{background:#2a4a6a;}
.footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.f-txt{font-size:0.58rem;color:var(--muted);font-weight:700;letter-spacing:1.5px;}
.f-dots{display:flex;gap:4px;}
.f-d{width:6px;height:6px;border-radius:50%;background:rgba(26,46,74,0.15);}
.f-d.on{background:var(--navy);}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <div><div class="h-title">Zezwolenia i tranzyt</div><div class="h-sub">Lekcja 19 &middot; Modu&#322; 3 &middot; Angielski z Mareczkiem &middot; Crosshaul</div></div>
  <div class="h-badge">19 / 30</div>
</div>
<div class="prog-row">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-txt" id="progTxt">1 / 16</div>
</div>
<div class="q-card" id="qCard">
  <div class="qc-bar"></div>
  <div class="qc-head">
    <div class="qc-num" id="qNum">PYTANIE 1 / 16</div>
    <div class="qc-pts" id="qPts">0 pkt</div>
  </div>
  <div class="qc-body">
    <div class="word-en" id="wordEn"></div>
    <div class="snd-btn"><button id="sndBtn" onclick="speakWord()">&#128266; Pos&#322;uchaj wymowy</button></div>
    <div class="translation-box" id="transBox">
      <div class="tb-q">Czy to poprawne t&#322;umaczenie?</div>
      <div class="tb-pl" id="tbPl"></div>
    </div>
    <div class="tf-row">
      <button class="btn-tf true-btn" id="btnTrue" onclick="answer(true)">&#10003; TAK</button>
      <button class="btn-tf false-btn" id="btnFalse" onclick="answer(false)">&#10007; NIE</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">DALEJ &#8594;</button>
    <div class="dots" id="dots"></div>
  </div>
</div>
<div class="end-card" id="endCard">
  <div class="end-icon" id="endIcon"></div>
  <div class="end-title" id="endTitle"></div>
  <div class="end-sub" id="endSub"></div>
  <div class="sc-box"><div class="sc-num" id="scNum"></div><div class="sc-lbl">Poprawnych</div></div>
  <div class="vocab-box">
    <div class="vb-title">S&#322;ownik &mdash; Lekcja 19</div>
    <div class="vb-grid" id="vocabGrid"></div>
  </div>
  <button class="btn-restart" onclick="restart()">&#8635; Zagraj jeszcze raz</button>
</div>
<div class="footer">
  <div class="f-txt">ANGIELSKI Z MARECZKIEM &middot; CROSSHAUL</div>
  <div class="f-dots"><div class="f-d"></div><div class="f-d"></div><div class="f-d"></div><div class="f-d on"></div><div class="f-d"></div></div>
</div>
</div>
<script>
var VOCAB = [
  {en:"transit",          pl:"tranzyt"},
  {en:"cabotage",         pl:"kabotaż"},
  {en:"CEMT permit",      pl:"zezwolenie CEMT"},
  {en:"bilateral permit", pl:"zezwolenie dwustronne"},
  {en:"authorisation",    pl:"zezwolenie"},
  {en:"originate from",   pl:"pochodzić z"},
  {en:"transit only",     pl:"tylko tranzyt"},
  {en:"permit",           pl:"zezwolenie / przepustka"},
];

var FAKES = [
  ["transport krajowy","ciężarówka","odprawa","list przewozowy"],
  ["tranzyt","odprawa celna","mandat","list drogi"],
  ["list przewozowy","zezwolenie dwustronne","winieta","mandat"],
  ["przepustka graniczna","zezwolenie CEMT","mandat","odprawa"],
  ["faktura","odprawa","list przewozowy","winieta"],
  ["jechać do","dostarczyć","przewozić","załadować"],
  ["tylko kabotaż","bez załadunku","tylko dostawa","transit international"],
  ["mandat","winieta","faktura","CMR"],
];

function buildQS() {
  var qs = [];
  for (var i = 0; i < VOCAB.length; i++) {
    qs.push({en:VOCAB[i].en, shown:VOCAB[i].pl, tf:true, correct:VOCAB[i].pl});
    var fi = Math.floor(Math.random()*FAKES[i].length);
    qs.push({en:VOCAB[i].en, shown:FAKES[i][fi], tf:false, correct:VOCAB[i].pl});
  }
  // Mieszanie pytań
  for (var j = qs.length-1; j > 0; j--) {
    var k = Math.floor(Math.random()*(j+1));
    var t = qs[j]; qs[j] = qs[k]; qs[k] = t;
  }
  return qs;
}

var QS = buildQS();
var cur = 0, score = 0, results = [];

function renderDots() {
  var h = "";
  for (var i = 0; i < QS.length; i++) {
    var c = "sd";
    if (i < results.length) c += results[i] ? " g" : " r";
    else if (i === cur) c += " on";
    h += "<div class='" + c + "'></div>";
  }
  document.getElementById("dots").innerHTML = h;
}

function render() {
  var q = QS[cur];
  document.getElementById("qNum").textContent = "PYTANIE " + (cur+1) + " / " + QS.length;
  document.getElementById("qPts").textContent = score + " pkt";
  document.getElementById("progFill").style.width = ((cur/QS.length)*100) + "%";
  document.getElementById("progTxt").textContent = (cur+1) + " / " + QS.length;
  document.getElementById("wordEn").textContent = q.en;
  document.getElementById("tbPl").textContent = q.shown;
  document.getElementById("transBox").className = "translation-box";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("btnNext").className = "btn-next";
  document.getElementById("btnTrue").className = "btn-tf true-btn";
  document.getElementById("btnFalse").className = "btn-tf false-btn";
  document.getElementById("btnTrue").disabled = false;
  document.getElementById("btnFalse").disabled = false;
  var s = document.getElementById("sndBtn");
  s.classList.remove("playing");
  s.textContent = "🔊 Posłuchaj wymowy";
  renderDots();
}

function answer(userTf) {
  var q = QS[cur];
  document.getElementById("btnTrue").disabled = true;
  document.getElementById("btnFalse").disabled = true;
  var ok = userTf === q.tf;
  results.push(ok);
  if (ok) score++;
  document.getElementById("transBox").className = "translation-box " + (ok ? "ok" : "no");
  var bt = document.getElementById("btnTrue");
  var bf = document.getElementById("btnFalse");
  if (ok) { if (userTf) bt.classList.add("sel-ok"); else bf.classList.add("sel-ok"); }
  else {
    if (userTf) bt.classList.add("sel-no"); else bf.classList.add("sel-no");
    if (q.tf) bt.classList.add("reveal"); else bf.classList.add("reveal");
  }
  var fb = document.getElementById("feedback");
  if (ok) {
    fb.className = "feedback show ok";
    fb.innerHTML = "&#10003; Poprawnie!<span class='fb-ans'>" + q.en + " = " + q.correct + "</span>";
  } else {
    fb.className = "feedback show no";
    fb.innerHTML = "&#10007; Błąd! Poprawne tłumaczenie:<span class='fb-ans'>" + q.en + " = " + q.correct + "</span>";
  }
  document.getElementById("qPts").textContent = score + " pkt";
  cur++;
  var nb = document.getElementById("btnNext");
  nb.className = "btn-next show";
  nb.textContent = cur < QS.length ? "DALEJ \u2192" : "WYNIKI \u2192";
}

function nextQ() {
  if (cur >= QS.length) { showEnd(); return; }
  render();
}

function showEnd() {
  document.getElementById("qCard").style.display = "none";
  document.getElementById("endCard").classList.add("show");
  document.getElementById("progFill").style.width = "100%";
  document.getElementById("progTxt").textContent = "Ukończono!";
  document.getElementById("scNum").textContent = score + "/" + QS.length;
  var lvl = score >= 14 ? 0 : score >= 10 ? 1 : 2;
  var icons = ["🏆","👍","💪"];
  var titles = ["Doskonale!","Dobra robota!","Ćwicz dalej!"];
  var subs = ["Znasz wszystkie słówka!","Powtórz trudniejsze i zagraj jeszcze raz.","Zagraj jeszcze raz."];
  document.getElementById("endIcon").textContent = icons[lvl];
  document.getElementById("endTitle").innerHTML = titles[lvl];
  document.getElementById("endSub").innerHTML = subs[lvl];
  
  var h = "";
  for (var i = 0; i < VOCAB.length; i++) {
    // Słowniczek klikalny + delikatny efekt hover
    h += "<div class='vb-row' style=\"cursor:pointer;\" onmouseover=\"this.style.background='rgba(26,46,74,0.05)'\" onmouseout=\"this.style.background='transparent'\">";
    h += "<div class='vb-dot'></div><div class='vb-en'>"+VOCAB[i].en+"</div><div class='vb-pl'>&#8212; "+VOCAB[i].pl+"</div></div>";
  }
  document.getElementById("vocabGrid").innerHTML = h;
}

function restart() {
  cur=0;score=0;results=[];QS=buildQS();
  document.getElementById("qCard").style.display="block";
  document.getElementById("endCard").classList.remove("show");
  render();
}

/* ════════════════════════════════════════════════════════════
   NOWY SYSTEM AUDIO (MP3 Z ZABEZPIECZENIEM CACHE, BEZ SPACJI)
════════════════════════════════════════════════════════════ */
const AUDIO_MAP = {
  'transit': 'audio/L19/transit_l19.mp3',
  'cabotage': 'audio/L19/cabotage_l19.mp3',
  'CEMT permit': 'audio/L19/cemt_permit_l19.mp3',
  'bilateral permit': 'audio/L19/bilateral_permit_l19.mp3',
  'authorisation': 'audio/L19/authorisation_l19.mp3',
  'originate from': 'audio/L19/originate_from_l19.mp3',
  'transit only': 'audio/L19/transit_only_l19.mp3',
  'permit': 'audio/L19/permit_l19.mp3'
};

let _ap = null;

function _playAudio(text, btn, label) {
  const clean = text.replace(/[\u201c\u201d\u201e"]/g, '').trim();
  
  if(_ap) { 
    _ap.pause(); 
    _ap.currentTime = 0;
    _ap = null; 
  }
  
  const mp3 = AUDIO_MAP[clean];
  const lbl = label || '🔊 Posłuchaj wymowy';

  if (btn) {
    btn.classList.add('playing');
    btn.textContent = '⌛ Ładowanie...';
  }

  if (mp3) {
    const currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const timestamp = new Date().getTime(); 
    const audioUrl = currentPath + encodeURIComponent(mp3) + "?v=" + timestamp;

    _ap = new Audio(audioUrl);

    const watchdog = setTimeout(() => {
      if (btn && btn.classList.contains("playing")) {
        resetBtn();
      }
    }, 4000);

    function resetBtn() {
      clearTimeout(watchdog);
      if (btn) {
        btn.classList.remove('playing');
        btn.textContent = lbl;
      }
    }

    _ap.onplay = () => { if (btn) btn.textContent = '🔊 Odtwarzam...'; };
    _ap.onended = resetBtn;
    _ap.onerror = () => {
      console.warn("Błąd ładowania MP3, powrót do WebSpeech:", audioUrl);
      clearTimeout(watchdog);
      _webSpeech(clean, btn, lbl); 
    };

    _ap.play().catch((err) => {
      console.warn("Autoplay zablokowany:", err);
      _webSpeech(clean, btn, lbl);
    });

  } else {
    console.warn("Brak pliku MP3 dla tekstu:", clean);
    _webSpeech(clean, btn, lbl);
  }
}

function _webSpeech(text, btn, label){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const lbl = label || '🔊 Posłuchaj wymowy';
  if(btn){ btn.classList.add('playing'); btn.textContent='🔊 Odtwarzam (Bot)...'; }
  
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-GB'; u.rate=0.78;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(x=>x.name==='Google UK English Female')
      || voices.find(x=>x.lang==='en-GB')
      || voices.find(x=>x.lang.startsWith('en'));
    if(v) u.voice=v;
    u.onend = ()=>{ if(btn){ btn.classList.remove('playing'); btn.textContent = lbl; } };
    u.onerror = ()=>{ if(btn){ btn.classList.remove('playing'); btn.textContent = lbl; } };
    window.speechSynthesis.speak(u);
  }, 300);
}

function speakWord() {
  var idx = document.getElementById("btnNext").classList.contains("show") ? Math.max(0,cur-1) : cur;
  var btn = document.getElementById("sndBtn");
  _playAudio(QS[idx].en, btn, '🔊 Posłuchaj wymowy');
}

function speakVocab(word) {
  _playAudio(word, null, null);
}

/* INIT */
render();
</script>
</body>
</html>
